<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedbackBite - How Was Your Meal?</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    h1 { color: #e74c3c; }
    label { display: block; margin: 15px 0 8px; font-weight: bold; }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      background: #e74c3c;
      color: white;
      padding: 14px 30px;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
    }
    button:hover { background: #c0392b; }
    .thank-you { display: none; color: #27ae60; font-size: 20px; }  </style>
</head>
<body>
  <div class="container">
    <h1>❤️ How Was Your Meal?</h1>
    <p>We’d love to hear from you!</p>

    <form id="feedbackForm">
      <label>Overall Experience</label>
      <select name="rating" required>
        <option value="">Choose...</option>
        <option value="5">Excellent ★★★★★</option>
        <option value="4">Very Good ★★★★</option>
        <option value="3">Good ★★★</option>
        <option value="2">Fair ★★</option>
        <option value="1">Poor ★</option>
      </select>

      <label>How was the food?</label>
      <select name="food" required>
        <option value="">Choose...</option>
        <option value="Excellent">Excellent</option>
        <option value="Good">Good</option>
        <option value="Average">Average</option>
        <option value="Poor">Poor</option>
      </select>

      <label>What did you like most?</label>
      <input type="text" name="best" placeholder="e.g. Chicken Medium, Service..." required>

      <label>Any comments or suggestions?</label>
      <textarea name="comment" rows="4" placeholder="Optional"></textarea>

      <button type="submit">Submit Feedback</button>
    </form>

    <div id="thankYou" class="thank-you">
      <h2>Thank you! ❤️</h2>
      <p>Your feedback helps us serve you better every day.</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('feedbackForm');
    const thankYou = document.getElementById('thankYou');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      const formData = new FormData(form);
      
      fetch('https://script.google.com/macros/s/AKfycbwjrP7MnLwYlXvGbj5KAvsU9EMUarxvpAK3cVyD7F77cjvEnm8yGq5GtGrSw2nKEzxFRQ/exec', {   // ← Paste your Web App URL here
        method: 'POST',
        body: formData
      })
      .then(() => {
        form.style.display = 'none';
        thankYou.style.display = 'block';
      })
      .catch(() => alert("Something went wrong. Please try again."));
    });
  </script>
</body>
</html>
